##### =========================
##### CORE SETTINGS
##### =========================

# Use modern tmux term
set -g default-terminal "tmux-256color"

# True color support (safe for mac + linux)
set -as terminal-overrides ",xterm-256color:RGB"
set -as terminal-overrides ",screen-256color:RGB"

set -sg escape-time 0
set -g history-limit 64096

set -g mouse on
set -g focus-events on

# Start window index at 1
set -g base-index 1
set -g pane-base-index 1

##### =========================
##### PREFIX + BASIC BEHAVIOR
##### =========================

# prefix key
set-option -g prefix C-s
unbind C-b
bind C-s send-prefix

set-option -g repeat-time 0

##### =========================
##### WINDOW / PANE BEHAVIOR
##### =========================

set-window-option -g mode-keys vi
set -g automatic-rename off
set -g allow-rename on

##### Pane navigation (vim style)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

##### Resize panes
bind -r C-h resize-pane -L 10
bind -r C-j resize-pane -D 10
bind -r C-k resize-pane -U 10
bind -r C-l resize-pane -R 10

##### Window switching
bind -r Left previous-window
bind -r Right next-window
bind n new-window

##### Swap windows
bind-key -n C-S-Left swap-window -t -1 \; previous-window
bind-key -n C-S-Right swap-window -t +1 \; next-window

##### Kill all panes except current
bind -r e kill-pane -a

##### Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Reloaded!"

##### Open current directory (macOS)
bind o run-shell "open '#{pane_current_path}'"

##### =========================
##### COPY MODE (VI STYLE)
##### =========================

bind -T copy-mode-vi Escape send-keys -X cancel
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi y send -X copy-selection

bind v copy-mode -e
bind p paste-buffer

##### =========================
##### APPEARANCE
##### =========================

set -g status-justify left

set-option -g status-style bg=colour235,fg=colour136

set-window-option -g window-status-style fg=colour244,bg=colour234
set-window-option -g window-status-current-style fg=colour166,bg=default,bold

set -g pane-border-style fg=colour235
set -g pane-active-border-style fg=colour166

set-option -g message-style bg=colour235,fg=colour166

set-option -g display-panes-active-colour colour33
set-option -g display-panes-colour colour166

set-window-option -g clock-mode-colour colour64

set -g set-titles on
set -g set-titles-string "#T"

##### =========================
##### PLUGINS (TPM)
##### =========================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'omerxx/tmux-sessionx'

# sessionx bind
set -g @sessionx-bind 'o'

##### =========================
##### STATUS LINE / EXTERNAL FILES
##### =========================

source ~/.config/tmux/statusline.conf
source ~/.config/tmux/utility.conf

##### macOS specific tweaks
if-shell "uname -s | grep -q Darwin" "set-option -g default-shell /bin/zsh"

##### =========================
##### TPM (KEEP AT BOTTOM)
##### =========================

run '~/.tmux/plugins/tpm/tpm'